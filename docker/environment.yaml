name: tdmpc2
channels:
  - pytorch-nightly
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - glew=2.2.0
  - glib=2.78.4
  - pip=24.0
  - python=3.9
  - pytorch=2.6.0.dev20241112
  - pytorch-cuda=12.4
  - torchvision=0.15.2
  - pip:
    - dm-control==1.0.16
    - glfw==2.7.0
    # NOTE: the SO3 `rotations` package requires gymnasium>=1.0 (vector_entry_point,
    # AutoresetMode). This supersedes the classic 0.29.1 pin below; the dm-control
    # wrapper path may need adjustment under gymnasium 1.x.
    - gymnasium==1.1.1
    # - gymnasium==0.29.1   # original pin (classic dm-control / maniskill / metaworld)
    - ffmpeg==1.4
    - imageio==2.34.1
    - imageio-ffmpeg==0.4.9
    - h5py==3.11.0
    - hydra-core==1.3.2
    - hydra-submitit-launcher==1.2.0
    - submitit==1.5.1
    - omegaconf==2.3.0
    - moviepy==1.0.3
    - mujoco==3.1.2
    - numpy==1.24.4
    - tensordict-nightly==2025.1.1
    - torchrl-nightly==2025.1.1
    - kornia==0.7.2
    - termcolor==2.4.0
    - tqdm==4.66.4
    - pandas==2.0.3
    - wandb==0.17.4
    ####################
    # SO3 rotation benchmarks (rotations package + her_orient / robosuite):
    # jax pinned to a release compatible with the numpy==1.24.4 pin above
    # (jax>=0.5 requires numpy>=1.25). Bump both together if you need newer jax.
    - jax==0.4.30
    - jaxlib==0.4.30
    - array-api-compat==1.10.0
    - scipy==1.13.1
    # robosuite>=1.5 for the composite-controller API used by the robosuite wrapper.
    # Remove if you only run the her_orient (FR3 MuJoCo) tasks.
    - robosuite>=1.5
    ####################
    # Gym:
    # (unmaintained but required for maniskill2/meta-world)
    # - "cython<3"
    # - wheel==0.38.0
    # - setuptools==65.5.0
    # - mujoco==2.3.1
    # - mujoco-py==2.1.2.14
    # - gym==0.21.0
    ####################
    # ManiSkill2:
    # (requires gym==0.21.0 which occasionally breaks)
    # - mani-skill2==0.4.1
    ####################
    # Meta-World:
    # (requires gym==0.21.0 which occasionally breaks)
    # - git+https://github.com/Farama-Foundation/Metaworld.git@04be337a12305e393c0caf0cbf5ec7755c7c8feb
    ####################
    # MyoSuite:
    # - myosuite
    ####################
    # Classic MuJoCo/Box2d:
    # - swig
    # - gymnasium[box2d]
    ####################
